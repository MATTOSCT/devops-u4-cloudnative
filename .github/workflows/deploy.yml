name: CI/CD Cloud Native Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push servico-dados
        uses: docker/build-push-action@v5
        with:
          context: ./servico-dados
          push: true
          tags: thaysmattos/servico-dados:latest

      - name: Build e Push servico-display
        uses: docker/build-push-action@v5
        with:
          context: ./servico-display
          push: true
          tags: thaysmattos/servico-display:latest

      - name: Deploy concluido
        run: echo "Imagens publicadas com sucesso no Docker Hub!"
