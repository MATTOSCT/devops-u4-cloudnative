name: CI/CD Cloud Native Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_DADOS: thaysmattos/servico-dados
  IMAGE_DISPLAY: thaysmattos/servico-display

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências e testar servico-dados
        run: |
          cd servico-dados
          pip install -r requirements.txt pytest
          python -c "from app import app; print('servico-dados OK')"

      - name: Instalar dependências e testar servico-display
        run: |
          cd servico-display
          pip install -r requirements.txt pytest
          python -c "from app import app; print('servico-display OK')"

  # ── Job 2: Build e Push Docker ──────────────────────────────────────────
  docker-build-push:
    name: Build e Push das Imagens Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push — servico-dados
        uses: docker/build-push-action@v5
        with:
          context: ./servico-dados
          push: true
          tags: |
            ${{ env.IMAGE_DADOS }}:latest
            ${{ env.IMAGE_DADOS }}:${{ github.sha }}

      - name: Build e Push — servico-display
        uses: docker/build-push-action@v5
        with:
          context: ./servico-display
          push: true
          tags: |
            ${{ env.IMAGE_DISPLAY }}:latest
            ${{ env.IMAGE_DISPLAY }}:${{ github.sha }}

  # ── Job 3: Deploy no Kubernetes ─────────────────────────────────────────
  deploy:
    name: Deploy no Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Aplicar namespace e manifests base
        run: |
          kubectl apply -k k8s/base/

      - name: Aplicar Prometheus
        run: |
          kubectl apply -f k8s/prometheus/prometheus.yaml

      - name: Aplicar Jaeger
        run: |
          kubectl apply -f k8s/jaeger/jaeger.yaml

      - name: Atualizar imagens com SHA do commit
        run: |
          kubectl set image deployment/servico-dados \
            servico-dados=${{ env.IMAGE_DADOS }}:${{ github.sha }} \
            -n cloudnative
          kubectl set image deployment/servico-display \
            servico-display=${{ env.IMAGE_DISPLAY }}:${{ github.sha }} \
            -n cloudnative

      - name: Verificar rollout
        run: |
          kubectl rollout status deployment/servico-dados -n cloudnative --timeout=120s
          kubectl rollout status deployment/servico-display -n cloudnative --timeout=120s

      - name: Aplicar configuração de edge
        run: |
          kubectl apply -f k8s/edge/edge-deployment.yaml

      - name: Verificar pods em execução
        run: |
          kubectl get pods -n cloudnative
          kubectl get pods -n cloudnative-edge
