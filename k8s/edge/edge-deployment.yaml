apiVersion: apps/v1
kind: Deployment
metadata:
  name: servico-dados-edge
  namespace: cloudnative-edge
  labels:
    app: servico-dados
    tier: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servico-dados
      tier: edge
  template:
    metadata:
      labels:
        app: servico-dados
        tier: edge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: servico-dados
          image: thaysmattos/servico-dados:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          # Probes ajustados para conectividade instável na borda
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5       # mais tolerante a falhas transitórias
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 10
          env:
            - name: FLASK_ENV
              value: "production"
            - name: EDGE_MODE
              value: "true"
            - name: BUFFER_DIR
              value: "/data/buffer"
          volumeMounts:
            - name: buffer-local
              mountPath: /data/buffer
      volumes:
        - name: buffer-local
          emptyDir: {}   # simula armazenamento local na borda
---
apiVersion: v1
kind: Service
metadata:
  name: servico-dados-edge
  namespace: cloudnative-edge
spec:
  type: ClusterIP
  selector:
    app: servico-dados
    tier: edge
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudnative-edge
  labels:
    name: cloudnative-edge
    tier: edge
