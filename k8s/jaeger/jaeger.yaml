apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: cloudnative
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.56
          ports:
            - containerPort: 5775   # agent UDP
            - containerPort: 6831   # agent compact thrift
            - containerPort: 6832   # agent binary thrift
            - containerPort: 5778   # agent config
            - containerPort: 16686  # UI
            - containerPort: 14268  # collector HTTP
            - containerPort: 14250  # collector gRPC
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: cloudnative
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 30686
    - name: thrift-compact
      port: 6831
      targetPort: 6831
      protocol: UDP
    - name: collector-http
      port: 14268
      targetPort: 14268
