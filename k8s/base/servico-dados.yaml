apiVersion: apps/v1
kind: Deployment
metadata:
  name: servico-dados
  namespace: cloudnative
  labels:
    app: servico-dados
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: servico-dados
  template:
    metadata:
      labels:
        app: servico-dados
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: servico-dados
          image: thaysmattos/servico-dados:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: FLASK_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: servico-dados
  namespace: cloudnative
  labels:
    app: servico-dados
spec:
  type: ClusterIP
  selector:
    app: servico-dados
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
