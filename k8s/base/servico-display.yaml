apiVersion: apps/v1
kind: Deployment
metadata:
  name: servico-display
  namespace: cloudnative
  labels:
    app: servico-display
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: servico-display
  template:
    metadata:
      labels:
        app: servico-display
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5001"
    spec:
      containers:
        - name: servico-display
          image: thaysmattos/servico-display:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: DADOS_SERVICE_URL
              value: "http://servico-dados:5000"
            - name: FLASK_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: servico-display
  namespace: cloudnative
  labels:
    app: servico-display
spec:
  type: NodePort
  selector:
    app: servico-display
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30001
      protocol: TCP
